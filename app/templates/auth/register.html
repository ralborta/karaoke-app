{% extends "base.html" %}

{% block title %}Registro - Karaoke Live{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center" style="min-height: 70vh;">
    <div class="col-md-6 col-lg-5">
        <div class="glass-card p-5 text-center position-relative overflow-hidden">
            <!-- Decorative Glow -->
            <div class="position-absolute" style="top: -50px; right: -50px; width: 150px; height: 150px; background: var(--accent-color); filter: blur(70px); opacity: 0.3; border-radius: 50%;"></div>

            <div class="mb-4">
                <i class="fas fa-microphone-alt text-accent fa-3x mb-3" style="filter: drop-shadow(0 0 10px rgba(183, 107, 255, 0.5));"></i>
                <h2 class="text-white font-weight-bold">Crear Cuenta</h2>
                <p class="text-muted small">Únete a la lista de cantantes</p>
            </div>
            
            <form method="POST" action="{{ url_for('auth.register') }}">
                <div class="form-group text-left mb-3">
                    <label for="username" class="text-white-50 small text-uppercase font-weight-bold">Usuario</label>
                    <div class="input-group glass-input-group">
                        <div class="input-group-prepend">
                            <span class="input-group-text bg-transparent border-0 text-accent"><i class="fas fa-user-astronaut"></i></span>
                        </div>
                        <input type="text" class="form-control bg-transparent text-white border-0" id="username" name="username" required placeholder="Cómo te llamarán en el show">
                    </div>
                </div>

                <div class="form-group text-left mb-3">
                    <label for="email" class="text-white-50 small text-uppercase font-weight-bold">Email</label>
                    <div class="input-group glass-input-group">
                        <div class="input-group-prepend">
                            <span class="input-group-text bg-transparent border-0 text-accent"><i class="fas fa-envelope"></i></span>
                        </div>
                        <input type="email" class="form-control bg-transparent text-white border-0" id="email" name="email" required placeholder="tu@email.com">
                    </div>
                </div>
                
                <div class="form-group text-left mb-3">
                    <label for="password" class="text-white-50 small text-uppercase font-weight-bold">Contraseña</label>
                    <div class="input-group glass-input-group">
                        <div class="input-group-prepend">
                            <span class="input-group-text bg-transparent border-0 text-accent"><i class="fas fa-lock"></i></span>
                        </div>
                        <input type="password" class="form-control bg-transparent text-white border-0" id="password" name="password" required placeholder="Crea una contraseña segura">
                    </div>
                </div>

                <div class="form-group text-left mb-4">
                    <label for="confirm_password" class="text-white-50 small text-uppercase font-weight-bold">Confirmar Contraseña</label>
                    <div class="input-group glass-input-group">
                        <div class="input-group-prepend">
                            <span class="input-group-text bg-transparent border-0 text-accent"><i class="fas fa-check-circle"></i></span>
                        </div>
                        <input type="password" class="form-control bg-transparent text-white border-0" id="confirm_password" name="confirm_password" required placeholder="Repítela">
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary btn-block btn-lg rounded-pill shadow-lg text-uppercase font-weight-bold mb-3 mt-4" style="letter-spacing: 1px; background: linear-gradient(45deg, var(--primary-color), var(--accent-color)); border: none;">
                    Unirse a la Fiesta <i class="fas fa-star ml-2"></i>
                </button>
                
                <p class="text-muted small mb-0">¿Ya eres parte del elenco? <a href="{{ url_for('auth.login') }}" class="text-primary text-decoration-none font-weight-bold">Entra aquí</a></p>
            </form>
        </div>
    </div>
</div>

<style>
.glass-input-group {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 50px;
    padding: 2px 10px;
    transition: all 0.3s;
}
.glass-input-group:focus-within {
    background: rgba(255, 255, 255, 0.1);
    border-color: var(--accent-color);
    box-shadow: 0 0 15px rgba(183, 107, 255, 0.2);
}
.form-control:focus {
    box-shadow: none;
    background: transparent;
}
.form-control::placeholder {
    color: rgba(255,255,255,0.3);
}
</style>
{% endblock %}
