<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Karaoke TV Display</title>
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.1/css/all.min.css">
    <!-- Custom Styles -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        #streamContainer {
            width: 100vw;
            height: 100vh;
            position: relative;
        }
    </style>
</head>
<body>

<div id="streamContainer">
    <!-- Managed entirely by Javascript -->
</div>

<script>
let currentGlobalState = "IDLE";
let currentYoutubeId = "";

function renderStream(url) {
    const container = document.getElementById('streamContainer');
    if (!url) {
        container.innerHTML = `<div class="position-absolute w-100 h-100 d-flex flex-column align-items-center justify-content-center text-muted" style="background: var(--bg-color);">
            <div class="mb-5 glow-effect">
                <i class="fas fa-glass-cheers fa-5x text-primary" style="opacity: 0.8; filter: drop-shadow(0 0 20px rgba(0,242,254,0.5));"></i>
            </div>
            <h1 class="font-weight-bold text-white mb-2" style="font-size: 4rem; letter-spacing: 2px;">KARAOKE <span class="text-accent">LIVE</span></h1>
            <h3 style="opacity: 0.7; font-weight: 300;">Escanea el código QR de la mesa para unirte a la lista</h3>
        </div>`;
        return;
    }
    let embedUrl = url;
    if (!embedUrl.includes('youtube.com') && !embedUrl.includes('youtu.be')) {
        embedUrl = 'https://www.youtube.com/embed/' + url + '?autoplay=1';
    }
    container.innerHTML = `<iframe src="${embedUrl}" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%;" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>`;
}

function handleVotingUI(singerName) {
    const container = document.getElementById('streamContainer');
    container.innerHTML = `<div class="position-absolute w-100 h-100 d-flex flex-column align-items-center justify-content-center text-white pt-5" style="background: linear-gradient(135deg, rgba(15,12,41,1) 0%, rgba(48,43,99,1) 50%, rgba(36,36,62,1) 100%);">
        
        <div class="position-absolute" style="top: 50%; left: 50%; transform: translate(-50%, -50%); width: 60vw; height: 60vw; background: var(--accent-color); filter: blur(200px); opacity: 0.2; border-radius: 50%;"></div>
        
        <h1 class="display-2 font-weight-bold mb-4 text-center" style="text-shadow: 0 5px 20px rgba(0,0,0,0.5);">¡Un aplauso para <span class="text-accent">${singerName}</span>!</h1>
        <h2 class="mb-5 text-muted" style="font-weight: 300;">¡Abran sus teléfonos y voten ahora!</h2>
        
        <div class="d-flex mb-4">
            <i class="fas fa-star mx-3" style="font-size: 6rem; color: rgba(255,193,7,0.3); animation: pulse 2s infinite 0.1s;"></i>
            <i class="fas fa-star mx-3" style="font-size: 6rem; color: rgba(255,193,7,0.3); animation: pulse 2s infinite 0.2s;"></i>
            <i class="fas fa-star mx-3" style="font-size: 6rem; color: rgba(255,193,7,0.3); animation: pulse 2s infinite 0.3s;"></i>
            <i class="fas fa-star mx-3" style="font-size: 6rem; color: rgba(255,193,7,0.3); animation: pulse 2s infinite 0.4s;"></i>
            <i class="fas fa-star mx-3" style="font-size: 6rem; color: rgba(255,193,7,0.3); animation: pulse 2s infinite 0.5s;"></i>
        </div>
    </div>`;
}

async function pollState() {
    try {
        const res = await fetch('/party/state');
        const data = await res.json();
        const container = document.getElementById('streamContainer');
        
        if (data.party_state === 'IDLE') {
            if (currentGlobalState !== 'IDLE') {
                currentGlobalState = 'IDLE';
                renderStream(''); // En TV, cuando es IDLE no cargamos música random, cargamos pantalla de espera gigante
            }
        } 
        else if (data.party_state === 'COUNTDOWN') {
            currentGlobalState = 'COUNTDOWN';
            let remain = parseInt(data.countdown_end) - data.server_time;

            if (remain > 0) {
                let seconds = Math.ceil(remain / 1000);
                container.innerHTML = `<div class="position-absolute w-100 h-100 d-flex flex-column align-items-center justify-content-center text-white" style="background: radial-gradient(circle, rgba(110,44,184,0.4) 0%, rgba(15,12,41,1) 100%);">
                    <h2 class="mb-4 display-4" style="font-weight: 300;">¡Prepárate...</h2>
                    <h1 class="font-weight-bold text-primary mb-5" style="font-size: 8rem; text-shadow: 0 0 40px rgba(0, 242, 254, 0.5);">${data.current_singer}!</h1>
                    <div class="font-weight-bold" style="color: var(--accent-color); font-size: 15rem; line-height: 1;">${seconds}</div>
                </div>`;
            } else {
                if (currentYoutubeId !== data.current_youtube_id) {
                    currentYoutubeId = data.current_youtube_id;
                    renderStream(currentYoutubeId);
                }
            }
        }
        else if (data.party_state === 'VOTING') {
            if (currentGlobalState !== 'VOTING') {
                currentGlobalState = 'VOTING';
                currentYoutubeId = ""; 
            }
            handleVotingUI(data.current_singer);
        }
    } catch (e) {
        console.error("Polling error", e);
    }
}

// Polling súper rápido para 100% sincronización
setInterval(pollState, 2000);
pollState();
</script>
</body>
</html>
